project:
  name: final_project_AI_CUSTOM_cesar_estrada
  description: Context-Augmented Generation (CAG) system with HTTP API and persistent user context
  root: C:\Users\cesar\Desktop\final_project_AI_CUSTOM_cesar_estrada

stack:
  language: Python 3.14.6
  framework: stdlib http.server (no framework)
  dependencies: none (pure stdlib)
  architecture: |
    - backend/server.py: ThreadingHTTPServer with HTTP handlers (GET /health, /api/context; POST /api/ask)
    - backend/assistant.py: answer_question() for knowledge base queries
    - backend/cag.py: apply_context() to augment answers with user context (STUB - TDD red)
    - backend/context_store.py: ContextStore for user context persistence (STUB - TDD red)

strict_tdd: true
strict_tdd_rationale: test runner (unittest) is present and working; auto-detected from existing tests

testing:
